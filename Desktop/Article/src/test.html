<!doctype html>
<html>
  <head>
    <title>Realtime Articles Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f9f9f9;
      }

      h1 {
        margin-bottom: 20px;
      }

      form {
        margin-bottom: 30px;
      }

      input,
      textarea {
        display: block;
        width: 400px;
        margin-bottom: 10px;
        padding: 8px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      #articles {
        max-width: 600px;
      }

      .article {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.2s,
          background 0.2s;
      }

      .article.new {
        background: #e0ffe0;
        transform: scale(1.02);
      }

      .article h3 {
        margin: 0 0 5px 0;
      }

      .article p {
        margin: 0;
      }

      .actions {
        margin-top: 10px;
      }

      .actions button {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Realtime Articles Dashboard</h1>

    <!-- Create Article Form -->
    <form id="articleForm">
      <input type="text" id="title" placeholder="Title" required />
      <textarea id="content" placeholder="Content" required></textarea>
      <button type="submit">Create Article</button>
    </form>

    <!-- Articles Container -->
    <div id="articles"></div>

    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const API_URL = "http://localhost:3000/api/v1";
      const articlesContainer = document.getElementById("articles");
      const form = document.getElementById("articleForm");

      const socket = io("http://localhost:3000");

      // ==========================
      // Display Article
      // ==========================
      function displayArticle(article, prepend = true, highlight = false) {
        let div = document.querySelector(`.article[data-id="${article._id}"]`);

        if (!div) {
          // Create new article div
          div = document.createElement("div");
          div.classList.add("article");
          div.setAttribute("data-id", article._id);

          div.innerHTML = `
            <h3>${article.title}</h3>
            <p>${article.content}</p>
            <div class="actions">
              <button onclick="editArticle('${article._id}')">Edit</button>
              <button onclick="deleteArticle('${article._id}')">Delete</button>
            </div>
          `;

          if (prepend) articlesContainer.prepend(div);
          else articlesContainer.appendChild(div);
        } else {
          // Update existing
          div.querySelector("h3").textContent = article.title;
          div.querySelector("p").textContent = article.content;
        }

        if (highlight) {
          div.classList.add("new");
          setTimeout(() => div.classList.remove("new"), 2000);
        }
      }

      // ==========================
      // Load All Articles
      // ==========================
      async function loadArticles() {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();

          articlesContainer.innerHTML = "";

          if (data.success) {
            data.data.forEach((article) => displayArticle(article, false));
          }
        } catch (err) {
          console.error("Error loading articles:", err);
        }
      }

      loadArticles();

      // ==========================
      // Create Article
      // ==========================
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("title").value;
        const content = document.getElementById("content").value;

        await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, content }),
        });

        form.reset();
      });

      // ==========================
      // Edit Article
      // ==========================
      async function editArticle(id) {
        const newTitle = prompt("Enter new title:");
        const newContent = prompt("Enter new content:");

        if (!newTitle || !newContent) return;

        await fetch(`${API_URL}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitle, content: newContent }),
        });
      }

      // ==========================
      // Delete Article
      // ==========================
      async function deleteArticle(id) {
        await fetch(`${API_URL}/${id}`, {
          method: "DELETE",
        });
      }

      // ==========================
      // Socket.io Events
      // ==========================
      socket.on("connect", () => {
        console.log("Connected with socket ID:", socket.id);
      });

      // New article
      socket.on("article_created", (article) => {
        displayArticle(article, true, true);
      });

      // Updated article
      socket.on("article_updated", (article) => {
        displayArticle(article, false, true);
      });

      // Deleted article
      socket.on("article_deleted", (id) => {
        const div = document.querySelector(`.article[data-id="${id}"]`);
        if (div) div.remove();
      });
    </script>
  </body>
</html>
